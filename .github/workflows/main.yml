name: Build Pawn Compiler to WASM

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-wasm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.50

      - name: Verify Emscripten
        run: emcc --version

      - name: Create build directory
        run: mkdir -p build

      - name: Configure with emcmake
        run: |
          cd build
          emcmake cmake ../source/compiler \
            -DCMAKE_BUILD_TYPE=Release \
            -DPAWNC_NO_ASM=ON

      - name: Build with emmake
        run: |
          cd build
          emmake make -j$(nproc)

      - name: Link to WASM with Emscripten flags
        run: |
          mkdir -p dist

          # Cari semua .o files dulu untuk debug
          echo "Object files found:"
          find build/CMakeFiles/pawncc.dir/ -name "*.o" | sort

          # Link SEMUA .o files sekaligus
          emcc $(find build/CMakeFiles/pawncc.dir/ -name "*.o" | sort | tr '\n' ' ') \
            -o dist/pawncc.js \
            -s EXPORTED_FUNCTIONS='["_main"]' \
            -s EXPORTED_RUNTIME_METHODS='["callMain","FS"]' \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s FORCE_FILESYSTEM=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME="createPawnCompiler" \
            -s ENVIRONMENT='web' \
            -O2

      - name: Check output files
        run: |
          ls -lh dist/
          echo "✅ pawncc.wasm size: $(du -sh dist/pawncc.wasm | cut -f1)"
          echo "✅ pawncc.js  size:  $(du -sh dist/pawncc.js  | cut -f1)"

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: pawncc-wasm
          path: |
            dist/pawncc.wasm
            dist/pawncc.js
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wasm-${{ github.sha }}
          name: WASM Build ${{ github.sha }}
          files: |
            dist/pawncc.wasm
            dist/pawncc.js
          body: |
            Automated WASM build dari commit ${{ github.sha }}

            ## Cara pakai di plugin Acode:
            ```js
            const compiler = await createPawnCompiler();
            compiler.FS.writeFile('/input.pwn', sourceCode);
            compiler.callMain(['/input.pwn', '-o/output.amx']);
            const amx = compiler.FS.readFile('/output.amx');
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
